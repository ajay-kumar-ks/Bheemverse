version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qera_backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_PATH=/app/database/qera.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=["http://localhost:3000", "http://localhost:5173"]
    volumes:
      - ./database:/app/database
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - qera_network
    restart: unless-stopped

  frontend:
    build:
      context: ./qera/frontend
      dockerfile: Dockerfile.frontend
    container_name: qera_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - qera_network
    restart: unless-stopped

networks:
  qera_network:
    driver: bridge
